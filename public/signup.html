<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex justify-center items-center">
    <form id="signupForm" class="bg-white p-8 rounded shadow-md w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Create Account</h2>
        <div class="mb-4">
            <input type="text" id="username" name="username" placeholder="Username" required class="w-full p-2 border rounded">
        </div>
        <div class="mb-4">
            <input type="email" id="email" name="email" placeholder="Email" required class="w-full p-2 border rounded">
        </div>
        <div class="mb-6">
            <input type="password" id="password" name="password" placeholder="Password" required class="w-full p-2 border rounded">
        </div>
        <button class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Sign Up</button>
        <p class="text-sm mt-4 text-center">Already have an account? <a href="/login.html" class="text-blue-500">Login</a></p>
    </form>
    <script src="app.js"></script>
</body>
</html>
